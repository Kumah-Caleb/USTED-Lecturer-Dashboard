<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTED | Lecturer Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #003366 0%, #0055aa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .register-card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .form-control:focus {
            border-color: #003366;
            box-shadow: 0 0 0 0.2rem rgba(0,51,102,0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card register-card">
                    <div class="card-header" style="background-color: #003366; color: white; text-align: center; padding: 20px;">
                        <h4 class="mb-0">👨‍🏫 USTED Lecturer Registration</h4>
                        <small>Create your lecturer account</small>
                    </div>
                    <div class="card-body p-4">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="fullName" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="fullName" placeholder="Dr. John Smith" required>
                            </div>
                            <div class="mb-3">
                                <label for="lecturerId" class="form-label">Lecturer ID / Staff ID</label>
                                <input type="text" class="form-control" id="lecturerId" placeholder="e.g., LEC001 or LEC2024001" required>
                                <small class="text-muted">Format: LEC followed by numbers</small>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="lecturer@usted.edu.gh" required>
                            </div>
                            <div class="mb-3">
                                <label for="department" class="form-label">Department</label>
                                <select class="form-select" id="department">
                                    <option value="Information Technology">Information Technology</option>
                                    <option value="Computer Science">Computer Science</option>
                                    <option value="Engineering">Engineering</option>
                                    <option value="Business">Business</option>
                                    <option value="Mathematics">Mathematics</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Create a strong password" required>
                                <small class="text-muted">Minimum 8 characters</small>
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="confirmPassword" required>
                            </div>
                            <button type="submit" class="btn w-100" style="background-color: #003366; color: white; padding: 12px;">Register as Lecturer</button>
                        </form>
                        <hr>
                        <p class="text-center mb-0">
                            Already have a lecturer account? <a href="login.html">Login here</a>
                        </p>
                        <p class="text-center mt-2 small text-muted">
                            <a href="https://kumah-caleb.github.io/Research-Project-V.1/" target="_blank">Student Portal</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

        <script>
        const API_BASE_URL = 'https://aamusted-predictor-backend2.onrender.com';
        
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            if (password.length < 8) {
                alert('Password must be at least 8 characters');
                return;
            }
            
            const lecturerData = {
                username: document.getElementById('lecturerId').value,
                full_name: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                lecturer_id: document.getElementById('lecturerId').value,
                department: document.getElementById('department').value,
                password: password,
                role: 'lecturer'
            };
            
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registering...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/lecturer/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(lecturerData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('✅ Registration successful! Please login.');
                    window.location.href = 'login.html';
                } else {
                    alert('Registration failed: ' + (data.detail || data.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('Network error: ' + error.message);
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
