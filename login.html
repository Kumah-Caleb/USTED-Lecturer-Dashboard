<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTED | Lecturer Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #003366 0%, #0055aa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn-lecturer {
            background-color: #003366;
            color: white;
        }
        .btn-lecturer:hover {
            background-color: #002244;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card">
                    <div class="card-header" style="background-color: #003366; color: white; text-align: center; padding: 20px;">
                        <h4 class="mb-0">👨‍🏫 USTED Lecturer Portal</h4>
                        <small>Sign in to access your dashboard</small>
                    </div>
                    <div class="card-body p-4">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">Lecturer ID / Email</label>
                                <input type="text" class="form-control" id="username" placeholder="e.g., LEC001 or lecturer@usted.edu.gh" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                            </div>
                            <button type="submit" class="btn btn-lecturer w-100 py-2">Login to Dashboard</button>
                        </form>
                        <hr>
                        <p class="text-center mb-0">
                            Don't have a lecturer account? <a href="register.html">Register here</a>
                        </p>
                        <p class="text-center mt-2 small text-muted">
                            <a href="https://kumah-caleb.github.io/Research-Project-V.1/" target="_blank">Student Portal</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

        <script>
        const API_BASE_URL = 'https://aamusted-predictor-backend2.onrender.com';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
            submitBtn.disabled = true;
            
            try {
                // Try lecturer login endpoint first
                let response = await fetch(`${API_BASE_URL}/api/lecturer/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role: 'lecturer' })
                });
                
                let data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', 'lecturer');
                    localStorage.setItem('lecturerInfo', JSON.stringify(data.user));
                    alert('Login successful! Redirecting to dashboard...');
                    window.location.href = 'index.html';
                } else {
                    // Try regular login as fallback
                    const fallbackResponse = await fetch(`${API_BASE_URL}/api/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    
                    const fallbackData = await fallbackResponse.json();
                    
                    if (fallbackResponse.ok && fallbackData.user.role === 'lecturer') {
                        localStorage.setItem('token', fallbackData.token);
                        localStorage.setItem('role', 'lecturer');
                        localStorage.setItem('lecturerInfo', JSON.stringify(fallbackData.user));
                        alert('Login successful! Redirecting to dashboard...');
                        window.location.href = 'index.html';
                    } else {
                        alert('Login failed: Invalid lecturer credentials');
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Network error: ' + error.message);
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
